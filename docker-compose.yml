# =============================================================================
#  MindMate — Docker Compose
#  File location: mindmate/docker-compose.yml
#
#  Services
#  --------
#  db         PostgreSQL 15  — primary database
#  redis      Redis 7        — Celery broker + result backend + cache
#  backend    Django 4.2     — REST API  (port 8000)
#  worker     Celery worker  — background tasks (email, cleanup)
#  beat       Celery beat    — periodic task scheduler
#  frontend   React + Vite   — SPA dev server  (port 3000)
#
#  Quick start (development)
#  -------------------------
#  docker-compose up --build
#
#  Production (no hot-reload, Gunicorn, built React)
#  --------------------------------------------------
#  docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
#  Useful commands
#  ---------------
#  docker-compose logs -f backend          # stream Django logs
#  docker-compose logs -f worker           # stream Celery worker logs
#  docker-compose exec backend python manage.py createsuperuser
#  docker-compose exec backend python manage.py seed_data
#  docker-compose exec db psql -U mindmate_user -d mindmate_db
#  docker-compose down -v                  # stop + remove volumes (full reset)
# =============================================================================

version: "3.9"

# ---------------------------------------------------------------------------
# Shared environment block — referenced by backend, worker, and beat
# ---------------------------------------------------------------------------
x-backend-env: &backend-env
  # Django core
  DEBUG:                    "${DEBUG:-True}"
  SECRET_KEY:               "${SECRET_KEY:-mindmate-docker-dev-secret-change-in-prod-!!}"
  DJANGO_SETTINGS_MODULE:   "mindmate_project.settings"

  # Allowed hosts (comma-separated) — add your domain in production
  ALLOWED_HOSTS:            "${ALLOWED_HOSTS:-localhost,127.0.0.1,backend,0.0.0.0}"

  # Database — points to the 'db' service by hostname
  DB_NAME:                  "${DB_NAME:-mindmate_db}"
  DB_USER:                  "${DB_USER:-mindmate_user}"
  DB_PASSWORD:              "${DB_PASSWORD:-mindmate_pass}"
  DB_HOST:                  "db"
  DB_PORT:                  "5432"

  # Redis — single URL used for Celery broker, result backend, and Django cache
  REDIS_URL:                "redis://redis:6379/0"

  # JWT token lifetimes
  ACCESS_TOKEN_LIFETIME_MINUTES:  "${ACCESS_TOKEN_LIFETIME_MINUTES:-60}"
  REFRESH_TOKEN_LIFETIME_DAYS:    "${REFRESH_TOKEN_LIFETIME_DAYS:-7}"

  # CORS — allow the React dev server and any production domain
  CORS_ALLOWED_ORIGINS:     "${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}"

  # Email (SMTP) — set real credentials in .env for production
  EMAIL_HOST:               "${EMAIL_HOST:-smtp.gmail.com}"
  EMAIL_PORT:               "${EMAIL_PORT:-587}"
  EMAIL_HOST_USER:          "${EMAIL_HOST_USER:-}"
  EMAIL_HOST_PASSWORD:      "${EMAIL_HOST_PASSWORD:-}"
  DEFAULT_FROM_EMAIL:       "${DEFAULT_FROM_EMAIL:-MindMate <noreply@mindmate.rw>}"

  # Timezone
  TZ:                       "Africa/Kigali"

# ---------------------------------------------------------------------------
# Shared volume mount block — source code + persistent media
# ---------------------------------------------------------------------------
x-backend-volumes: &backend-volumes
  - ./backend:/app
  - media_files:/app/media
  - static_files:/app/staticfiles


# =============================================================================
# SERVICES
# =============================================================================
services:

  # ---------------------------------------------------------------------------
  # 1. PostgreSQL 15 — primary relational database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: mindmate_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       "${DB_NAME:-mindmate_db}"
      POSTGRES_USER:     "${DB_USER:-mindmate_user}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-mindmate_pass}"
      PGDATA:            /var/lib/postgresql/data/pgdata
      TZ:                Africa/Kigali
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Optional: auto-run db_setup.sql on first boot (extensions, extra roles)
      - ./backend/db_setup.sql:/docker-entrypoint-initdb.d/01_db_setup.sql:ro
    ports:
      - "${DB_PORT_EXPOSE:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mindmate_user} -d ${DB_NAME:-mindmate_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - mindmate_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # 2. Redis 7 — Celery broker + result backend + Django cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: mindmate_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel notice
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT_EXPOSE:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - mindmate_net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # 3. Django REST API — runs migrations + seeds data on first start
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
      args:
        PYTHON_VERSION: "3.11"
    image: mindmate_backend:dev
    container_name: mindmate_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *backend-env
    volumes: *backend-volumes
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    # Entrypoint:
    #   1. Wait until DB is truly ready (extra guard — healthcheck already handles this)
    #   2. Apply any pending migrations
    #   3. Run seed_data only if the User table is empty (idempotent on restart)
    #   4. Collect static files
    #   5. Start Django's dev server (replace with Gunicorn in production)
    command: >
      sh -c "
        echo '🌿 MindMate backend starting...' &&
        python manage.py migrate --noinput &&
        python manage.py shell -c \"
from django.contrib.auth import get_user_model
User = get_user_model()
if not User.objects.exists():
    print('Seeding database...')
    from django.core.management import call_command
    call_command('seed_data')
else:
    print('Database already seeded, skipping.')
\" &&
        python manage.py collectstatic --noinput --clear &&
        echo '✅ Backend ready at http://localhost:8000' &&
        python manage.py runserver 0.0.0.0:8000
      "
    networks:
      - mindmate_net
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # 4. Celery Worker — processes background tasks (emails, cleanup, reports)
  #    Queues: default | notifications | reports | maintenance
  # ---------------------------------------------------------------------------
  worker:
    image: mindmate_backend:dev
    container_name: mindmate_worker
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    environment:
      <<: *backend-env
    volumes: *backend-volumes
    command: >
      celery -A mindmate_project worker
        --loglevel=info
        --queues=default,notifications,reports,maintenance
        --concurrency=4
        --max-tasks-per-child=100
        --hostname=worker@%h
    networks:
      - mindmate_net
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # 5. Celery Beat — periodic task scheduler (digest, alerts, weekly reports)
  #    Only ONE beat instance should ever run — never scale this service.
  # ---------------------------------------------------------------------------
  beat:
    image: mindmate_backend:dev
    container_name: mindmate_beat
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    environment:
      <<: *backend-env
    volumes: *backend-volumes
    command: >
      celery -A mindmate_project beat
        --loglevel=info
        --scheduler django_celery_beat.schedulers:DatabaseScheduler
    networks:
      - mindmate_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # 6. React + Vite — frontend dev server with hot-module replacement
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
      args:
        NODE_VERSION: "20"
    image: mindmate_frontend:dev
    container_name: mindmate_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      # Vite public env vars (must be prefixed VITE_)
      VITE_API_URL:           "http://localhost:8000/api/v1"
      VITE_APP_NAME:          "MindMate"
      VITE_APP_VERSION:       "1.0.0"
      NODE_ENV:               "development"
      # Vite listens on all interfaces inside the container
      HOST:                   "0.0.0.0"
      PORT:                   "3000"
    volumes:
      - ./frontend:/app
      # Prevent host node_modules from overwriting container's compiled deps
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - mindmate_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # 7. Nginx reverse proxy (optional — uncomment for a more production-like
  #    local setup that routes /api/ → backend and / → frontend)
  # ---------------------------------------------------------------------------
  # nginx:
  #   image: nginx:1.25-alpine
  #   container_name: mindmate_nginx
  #   restart: unless-stopped
  #   depends_on:
  #     - backend
  #     - frontend
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - static_files:/app/staticfiles:ro
  #     - media_files:/app/media:ro
  #   networks:
  #     - mindmate_net


# =============================================================================
# NETWORKS
# =============================================================================
networks:
  mindmate_net:
    driver: bridge
    name: mindmate_network


# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  # PostgreSQL data — persists between container restarts
  postgres_data:
    driver: local
    name: mindmate_postgres_data

  # Redis snapshot — persists RDB dumps
  redis_data:
    driver: local
    name: mindmate_redis_data

  # Django uploaded files (profile photos, resource attachments)
  media_files:
    driver: local
    name: mindmate_media_files

  # Django collected static files (CSS, JS, admin assets)
  static_files:
    driver: local
    name: mindmate_static_files